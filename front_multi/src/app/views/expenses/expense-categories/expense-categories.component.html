<c-card>
  <c-card-header class="d-flex justify-content-between align-items-center">
    <span class="fw-semibold">Catégories de dépenses</span>
    <button cButton color="success" size="sm" (click)="openNew()">
      <svg cIcon name="cilPlus" class="me-1"></svg> Nouvelle catégorie
    </button>
  </c-card-header>
  <c-card-body>
    <div *ngIf="loading" class="text-center py-4"><c-spinner size="sm"></c-spinner></div>

    <div *ngIf="!loading" class="row g-3">
      <div *ngFor="let cat of categories" class="col-12 col-sm-6 col-md-4 col-lg-3">
        <c-card class="h-100" [style.border-left]="'4px solid ' + cat.color">
          <c-card-body>
            <div class="d-flex justify-content-between align-items-start mb-2">
              <div class="d-flex align-items-center gap-2">
                <span class="rounded-circle d-inline-flex align-items-center justify-content-center"
                  [style.background]="cat.color + '22'" [style.width]="'36px'" [style.height]="'36px'">
                  <svg cIcon [name]="cat.icon || 'cilCart'" [style.color]="cat.color" size="sm"></svg>
                </span>
                <div>
                  <div class="fw-semibold">{{ cat.name }}</div>
                  <c-badge [color]="cat.is_active ? 'success' : 'secondary'" class="small">
                    {{ cat.is_active ? 'Active' : 'Inactive' }}
                  </c-badge>
                </div>
              </div>
              <div class="d-flex gap-1">
                <button cButton color="warning" variant="ghost" size="sm" (click)="openEdit(cat)">
                  <svg cIcon name="cilPencil" size="sm"></svg>
                </button>
                <button cButton color="danger" variant="ghost" size="sm" (click)="delete(cat)">
                  <svg cIcon name="cilTrash" size="sm"></svg>
                </button>
              </div>
            </div>
            <div class="text-muted small" *ngIf="cat.description">{{ cat.description }}</div>
            <div class="mt-2 text-muted small">
              <strong>{{ cat.expenses_count || 0 }}</strong> dépense(s)
            </div>
          </c-card-body>
        </c-card>
      </div>

      <div *ngIf="categories.length === 0" class="col-12 text-center text-muted py-5">
        Aucune catégorie. Créez votre première catégorie.
      </div>
    </div>
  </c-card-body>
</c-card>

<!-- ===== MODAL ===== -->
<c-modal [visible]="showModal" (visibleChange)="showModal = $event">
  <c-modal-header>
    <h5 cModalTitle>{{ editMode ? 'Modifier la catégorie' : 'Nouvelle catégorie' }}</h5>
    <button cButtonClose (click)="showModal = false"></button>
  </c-modal-header>
  <c-modal-body>
    <form [formGroup]="form">
      <div class="mb-3">
        <label cLabel>Nom *</label>
        <input cFormControl formControlName="name" placeholder="Ex: Alimentation, Transport..."
          [class.is-invalid]="submitted && form.get('name')?.invalid">
        <div class="invalid-feedback">Nom requis</div>
      </div>

      <div class="mb-3">
        <label cLabel>Couleur</label>
        <div class="d-flex flex-wrap gap-2 mt-1">
          <div *ngFor="let c of colorOptions"
            class="rounded-circle cursor-pointer"
            [style.width]="'28px'" [style.height]="'28px'" [style.background]="c"
            [style.border]="form.get('color')?.value === c ? '3px solid #000' : '2px solid transparent'"
            (click)="form.get('color')?.setValue(c)">
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label cLabel>Description</label>
        <textarea cFormControl formControlName="description" rows="2" placeholder="Description optionnelle..."></textarea>
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" formControlName="is_active" id="catActive">
        <label class="form-check-label" for="catActive">Catégorie active</label>
      </div>
    </form>
  </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" (click)="showModal = false">Annuler</button>
    <button cButton color="primary" (click)="save()">{{ editMode ? 'Modifier' : 'Créer' }}</button>
  </c-modal-footer>
</c-modal>
