<div class="p-3 p-md-4">

  <!-- Header -->
  <div class="mb-4" style="background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-radius:16px;padding:24px 28px;color:white">
    <h4 class="fw-bold mb-1" style="font-size:1.3rem">Informations de l'Organisation</h4>
    <p class="mb-0" style="opacity:.75;font-size:.875rem">
      <span *ngIf="currentOrganisation" style="background:rgba(255,255,255,.15);border-radius:50px;padding:3px 12px;font-size:.8rem;font-weight:600;">
        {{ currentOrganisation.name }}
      </span>
    </p>
  </div>

  <!-- Alerts -->
  <c-alert *ngIf="successMessage" color="success" dismissible (dismissed)="successMessage = null" class="mb-3">
    {{ successMessage }}
  </c-alert>
  <c-alert *ngIf="error" color="danger" dismissible (dismissed)="error = null" class="mb-3">
    {{ error }}
  </c-alert>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-5">
    <c-spinner color="primary"></c-spinner>
    <p class="mt-2 text-muted small">Chargement...</p>
  </div>

  <!-- Formulaire -->
  <div *ngIf="!loading" style="background:#fff;border-radius:14px;border:1px solid #f0f0f0;box-shadow:0 2px 8px rgba(0,0,0,.04);padding:28px">
    <form [formGroup]="companyForm" (ngSubmit)="onSubmit()">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label fw-semibold small">Nom de l'organisation *</label>
          <input cFormControl type="text" formControlName="name" placeholder="Nom de l'organisation"
                 style="border-radius:8px"
                 [class.is-invalid]="f['name'].invalid && f['name'].touched" />
          <div class="invalid-feedback" *ngIf="f['name'].errors?.['required']">Le nom est obligatoire</div>
          <div class="invalid-feedback" *ngIf="f['name'].errors?.['minlength']">Minimum 2 caractères</div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold small">Email</label>
          <input cFormControl type="email" formControlName="email" placeholder="contact@organisation.com"
                 style="border-radius:8px"
                 [class.is-invalid]="f['email'].invalid && f['email'].touched" />
          <div class="invalid-feedback">Format d'email invalide</div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold small">Téléphone</label>
          <input cFormControl type="tel" formControlName="phone" placeholder="+224 xxx xxx xxx"
                 style="border-radius:8px" />
        </div>

      </div>

      <!-- Actions -->
      <div class="d-flex justify-content-end gap-2 mt-4 pt-3" style="border-top:1px solid #f0f0f0">
        <button type="button" cButton color="secondary" variant="outline"
                (click)="loadOrganisationInfo()" [disabled]="saving" style="border-radius:8px">
          Annuler
        </button>
        <button type="submit" cButton [disabled]="companyForm.invalid || saving"
                style="background:linear-gradient(135deg,#1a1a2e,#0f3460);border:none;border-radius:8px;font-weight:600;color:#fff;padding:8px 24px">
          <c-spinner *ngIf="saving" size="sm" class="me-2"></c-spinner>
          {{ saving ? 'Enregistrement...' : 'Enregistrer' }}
        </button>
      </div>
    </form>
  </div>

</div>
